name: Keep backend warm

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min — Render free tier sleeps after 15 min idle
  workflow_dispatch:          # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthz
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cv-alerts-backend-1.onrender.com/healthz)
          echo "Response: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
