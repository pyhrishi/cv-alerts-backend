# Render infrastructure-as-code for the Cyber Vision alert backend.
# Secrets are NOT here — set CV_BASE_URL, CV_API_TOKEN, ALLOWED_ORIGINS in the Render dashboard.
services:
  - type: web
    name: cv-alerts-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    envVars:
      - key: CV_BASE_URL
        sync: false          # set in dashboard (never in git)
      - key: CV_API_TOKEN
        sync: false          # set in dashboard (never in git)
      - key: ALLOWED_ORIGINS
        sync: false          # the Vercel frontend URL, e.g. https://cv-alerts-frontend.vercel.app
      - key: CACHE_TTL_SECONDS
        value: "60"
