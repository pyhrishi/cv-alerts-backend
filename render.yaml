# Render infrastructure-as-code for the Cyber Vision alert backend.
# The PUBLIC demo runs DATA_MODE=snapshot: it serves the bundled docs/api-samples/*.snapshot.json
# and NEVER calls the Center, so no token is needed and no live OT telemetry is exposed.
# For a live deployment, set DATA_MODE=live and provide CV_BASE_URL + CV_API_TOKEN in the dashboard.
services:
  - type: web
    name: cv-alerts-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    envVars:
      - key: DATA_MODE
        value: snapshot            # public demo: bundled data only, never calls the Center
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000"   # PLACEHOLDER — replaced with the exact Vercel URL after FE deploy
      - key: CACHE_TTL_SECONDS
        value: "60"
      # --- live mode only (leave unset for the snapshot demo) ---
      - key: CV_BASE_URL
        sync: false                # dashboard-only; required only when DATA_MODE=live
      - key: CV_API_TOKEN
        sync: false                # dashboard-only; required only when DATA_MODE=live
